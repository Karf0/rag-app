services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpass}
      POSTGRES_DB: ragdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      # Same user/db as POSTGRES_* and the api's DATABASE_URL below.
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy   # api won't start until pg_isready passes
    environment:
      # host is `db` (the compose service name), not localhost.
      DATABASE_URL: postgresql+asyncpg://raguser:${POSTGRES_PASSWORD:-ragpass}@db:5432/ragdb
      LLM_API_KEY: ${LLM_API_KEY:-}
    ports:
      - "8000:8000"

volumes:
  pgdata:
